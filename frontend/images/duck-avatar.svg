<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 13" shape-rendering="crispEdges">
    <!-- head top -->
    <rect x="5" y="0" width="6" height="1" fill="#fdfaf0" />
    <rect x="3" y="1" width="1" height="1" fill="#1a1a1a" />
    <rect x="4" y="1" width="8" height="1" fill="#fdfaf0" />
    <rect x="12" y="1" width="1" height="1" fill="#1a1a1a" />
    <!-- eyes -->
    <rect x="3" y="2" width="1" height="1" fill="#1a1a1a" />
    <rect x="4" y="2" width="1" height="1" fill="#fdfaf0" />
    <rect x="5" y="2" width="1" height="1" fill="#1a1a1a" />
    <rect x="6" y="2" width="4" height="1" fill="#fdfaf0" />
    <rect x="10" y="2" width="1" height="1" fill="#1a1a1a" />
    <rect x="11" y="2" width="1" height="1" fill="#fdfaf0" />
    <rect x="12" y="2" width="1" height="1" fill="#1a1a1a" />
    <!-- bill (wide flat) -->
    <rect x="2" y="3" width="1" height="1" fill="#1a1a1a" />
    <rect x="3" y="3" width="10" height="1" fill="#e08a1e" />
    <rect x="13" y="3" width="1" height="1" fill="#1a1a1a" />
    <rect x="3" y="4" width="1" height="1" fill="#1a1a1a" />
    <rect x="4" y="4" width="8" height="1" fill="#e08a1e" />
    <rect x="12" y="4" width="1" height="1" fill="#1a1a1a" />
    <!-- body -->
    <rect x="3" y="5" width="1" height="1" fill="#1a1a1a" />
    <rect x="4" y="5" width="8" height="1" fill="#fdfaf0" />
    <rect x="12" y="5" width="1" height="1" fill="#1a1a1a" />
    <rect x="3" y="6" width="1" height="1" fill="#1a1a1a" />
    <rect x="4" y="6" width="8" height="1" fill="#fdfaf0" />
    <rect x="12" y="6" width="1" height="1" fill="#1a1a1a" />
    <rect x="3" y="7" width="1" height="1" fill="#1a1a1a" />
    <rect x="4" y="7" width="8" height="1" fill="#fdfaf0" />
    <rect x="12" y="7" width="1" height="1" fill="#1a1a1a" />
    <!-- taper -->
    <rect x="4" y="8" width="1" height="1" fill="#1a1a1a" />
    <rect x="5" y="8" width="6" height="1" fill="#fdfaf0" />
    <rect x="11" y="8" width="1" height="1" fill="#1a1a1a" />
    <rect x="5" y="9" width="1" height="1" fill="#1a1a1a" />
    <rect x="6" y="9" width="4" height="1" fill="#fdfaf0" />
    <rect x="10" y="9" width="1" height="1" fill="#1a1a1a" />
    <!-- legs -->
    <rect x="6" y="10" width="1" height="1" fill="#e08a1e" />
    <rect x="9" y="10" width="1" height="1" fill="#e08a1e" />
    <rect x="6" y="11" width="1" height="1" fill="#e08a1e" />
    <rect x="9" y="11" width="1" height="1" fill="#e08a1e" />
    <!-- webbed feet -->
    <rect x="4" y="12" width="3" height="1" fill="#e08a1e" />
    <rect x="9" y="12" width="3" height="1" fill="#e08a1e" />
</svg>
