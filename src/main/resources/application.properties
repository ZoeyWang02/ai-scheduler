spring.application.name=ai-scheduler

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aischeduler}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=existing-schema-baseline

server.port=${SERVER_PORT:8081}

app.cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:8099}

llm.api.url=${LLM_API_URL:https://api.groq.com/openai/v1/chat/completions}
llm.api.key=${LLM_API_KEY:}
llm.model=${LLM_MODEL:llama-3.3-70b-versatile}

google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8081/api/auth/oauth/google/callback}

# 关闭 Spring Boot 静态资源缓存，方便前端调试
spring.web.resources.cache.period=0
spring.thymeleaf.cache=false